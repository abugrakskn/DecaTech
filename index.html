      </div>
      <div class="field-row"><label class="field-label">Öncelik</label>
        <select class="field-select" id="mPriority">
          <option value="pill-green">Düşük</option><option value="pill-amber">Orta</option><option value="pill-red">Yüksek</option>
        </select>
      </div>
    </div>
    <div class="field-grid2">
      <div class="field-row"><label class="field-label">Sorumlu</label><input class="field-input" type="text" id="mAssignee" placeholder="ör: AY"></div>
      <div class="field-row"><label class="field-label">Sütun</label>
        <select class="field-select" id="mCol">
          <option value="todo">Yapılacak</option><option value="doing">Devam Ediyor</option><option value="done">Tamamlandı</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeTaskModal()">İptal</button>
      <button class="btn btn-primary btn-sm" onclick="saveTask()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>
<script src="shared.js"></script>
<script>
// ── Highlight active nav ──
document.getElementById('nav-genel')?.classList.add('active');

// ── Shared project modal ──
function openProjModal(){document.getElementById('projDD').classList.remove('show');document.getElementById('pName').value='';document.getElementById('projModalBg').classList.add('open')}
function closeProjModal(){document.getElementById('projModalBg').classList.remove('open')}
function createProj(){
  const name=document.getElementById('pName').value.trim();
  if(!name){toast('Proje adı gerekli!','error');return}
  const color=document.getElementById('pColor').value;
  const projs=ST.projects;projs.push({id:'p'+Date.now(),name,color});
  ST.setProjects(projs);ST.setActiveProj(projs[projs.length-1].id);
  renderProjDD();closeProjModal();toast(name+' oluşturuldu','success');
}

// ── Close modals on backdrop click ──
['projModalBg','taskModalBg'].forEach(id=>{
  document.getElementById(id)?.addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById(id).classList.remove('open')});
});


let _editingTask = null;

function openTaskModal(col) {
  _editingTask = null;
  document.getElementById('taskModalTitle').textContent = 'Yeni Görev';
  document.getElementById('mTitle').value = '';
  document.getElementById('mDesc').value = '';
  document.getElementById('mTag').value = 'pill-blue';
  document.getElementById('mPriority').value = 'pill-green';
  document.getElementById('mAssignee').value = '';
  document.getElementById('mCol').value = col || 'todo';
  document.getElementById('taskModalBg').classList.add('open');
  setTimeout(() => document.getElementById('mTitle').focus(), 100);
}
function openEditTask(id) {
  const t = ST.tasks.find(x => x.id === id); if (!t) return;
  _editingTask = id;
  document.getElementById('taskModalTitle').textContent = 'Görevi Düzenle';
  document.getElementById('mTitle').value = t.title;
  document.getElementById('mDesc').value = t.desc || '';
  document.getElementById('mTag').value = t.tag;
  document.getElementById('mPriority').value = t.priority;
  document.getElementById('mAssignee').value = t.assignee || '';
  document.getElementById('mCol').value = t.col;
  document.getElementById('taskModalBg').classList.add('open');
}
function closeTaskModal() { document.getElementById('taskModalBg').classList.remove('open'); _editingTask = null; }
function saveTask() {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) { toast('Başlık zorunlu!', 'error'); return; }
  const tasks = ST.tasks;
  if (_editingTask) {
    const t = tasks.find(x => x.id === _editingTask);
    Object.assign(t, {title, desc: document.getElementById('mDesc').value.trim(), tag: document.getElementById('mTag').value, priority: document.getElementById('mPriority').value, assignee: document.getElementById('mAssignee').value.trim().toUpperCase().slice(0,3), col: document.getElementById('mCol').value});
    toast('Görev güncellendi', 'success');
  } else {
    tasks.push({id:'t'+Date.now(),title,desc:document.getElementById('mDesc').value.trim(),col:document.getElementById('mCol').value,tag:document.getElementById('mTag').value,priority:document.getElementById('mPriority').value,assignee:document.getElementById('mAssignee').value.trim().toUpperCase().slice(0,3),created:Date.now()});
    addNotif('📋','Görev eklendi',`"${title}" oluşturuldu.`);
    toast('Görev eklendi', 'success');
  }
  ST.setTasks(tasks); closeTaskModal(); renderOverview();
}
function delTask(id) {
  const tasks = ST.tasks; const t = tasks.find(x => x.id === id); if (!t) return;
  if (!confirm(`"${t.title}" silinsin mi?`)) return;
  ST.setTasks(tasks.filter(x => x.id !== id)); toast('Silindi', 'info'); renderOverview();
}

function colHTML(colId, title, color, tasks, addBtn) {
  const ct = tasks.filter(t => t.col === colId);
  return `<div class="k-col" id="col-${colId}" ondragover="dover(event,'${colId}')" ondrop="ddrop(event,'${colId}')" ondragleave="dleave('${colId}')">
    <div class="k-col-header">
      <div class="k-col-indicator" style="background:${color}"></div>
      <div class="k-col-title" style="color:${color}">${title}</div>
      <div class="k-col-count">${ct.length}</div>
    </div>
    <div class="k-body" id="kb-${colId}">${ct.length ? ct.map(taskCardHTML).join('') : '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Görev yok</div></div>'}</div>
    ${addBtn ? `<div class="k-footer"><button class="k-add" onclick="openTaskModal('${colId}')">＋ Görev ekle</button></div>` : ''}
  </div>`;
}

function renderOverview() {
  const proj = getProj();
  document.getElementById('pgTitle').textContent = proj.name + ' — Genel Bakış';
  const now = new Date();
  document.getElementById('pgSub').textContent = 'Güncellendi: ' + now.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'}) + ', ' + now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  const tasks = ST.tasks;
  const todo = tasks.filter(t=>t.col==='todo').length;
  const doing = tasks.filter(t=>t.col==='doing').length;
  const done  = tasks.filter(t=>t.col==='done').length;
  const total = tasks.length || 1;
  const pct = Math.round(done/total*100);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">Toplam Görev</div><div class="stat-val" style="color:var(--accent-light)">${total}</div><div class="stat-bar"><div class="stat-bar-fill" style="width:100%;background:var(--accent2)"></div></div><div class="stat-foot"><div class="stat-change neutral">tüm görevler</div></div></div>
    <div class="stat-card"><div class="stat-lbl">Devam Eden</div><div class="stat-val" style="color:var(--amber)">${doing}</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${doing/total*100}%;background:var(--amber)"></div></div><div class="stat-foot"><div class="stat-change neutral">aktif sprint</div></div></div>
    <div class="stat-card"><div class="stat-lbl">Tamamlanan</div><div class="stat-val" style="color:var(--green)">${done}</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:var(--green)"></div></div><div class="stat-foot"><div class="stat-change up">↑ %${pct} tamamlandı</div></div></div>
    <div class="stat-card"><div class="stat-lbl">Yapılacak</div><div class="stat-val" style="color:var(--violet)">${todo}</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${todo/total*100}%;background:var(--violet)"></div></div><div class="stat-foot"><div class="stat-change neutral">bekliyor</div></div></div>`;
  document.getElementById('overviewBoard').innerHTML =
    colHTML('todo','Yapılacak','var(--text2)',tasks,false) +
    colHTML('doing','Devam Ediyor','var(--accent-light)',tasks,false) +
    colHTML('done','Tamamlandı','var(--green)',tasks,false);
}

renderOverview();


// ── Init ──
applyTheme(getTheme());
renderProjDD();
renderChat();
updateBadge();
renderUserPill();
</script>
</body>
</html>
